# Set the prefix key to backtick `
unbind C-b
set -g prefix `
bind ` send-prefix

# Reload config with `r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Better splits
unbind '"'
unbind %
bind | split-window -h
bind _ split-window -v

# Enable mouse support
set -g mouse on

# Enable vi mode in copy mode
setw -g mode-keys vi

# Set 256 colour support
set -g default-terminal "screen-256color"

# Shorter command delay
set -sg escape-time 10

# -------------------------------------------------------------------
# Mouse behaviour
# -------------------------------------------------------------------

# A drag starts copy mode and selects text even when the pane was not
# already in copy mode. Releasing the button copies and exits copy mode.
bind-key -T root MouseDrag1Pane copy-mode -M
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Mouse wheel scrolls tmux history. Without these bindings, Windows
# Terminal sends wheel events to tmux but the pane may appear not to scroll.
bind-key -T root WheelUpPane \
  if-shell -F '#{pane_in_mode}' \
    'send-keys -M' \
    'copy-mode -e; send-keys -X scroll-up'

bind-key -T root WheelDownPane \
  if-shell -F '#{pane_in_mode}' \
    'send-keys -M' \
    'send-keys -M'

# Middle-click pastes tmux's most recently copied buffer. Windows Terminal
# has no X11-style PRIMARY selection, so this provides equivalent behaviour.
bind-key -n MouseDown2Pane paste-buffer

# -------------------------------------------------------------------
# Clipboard integration
# -------------------------------------------------------------------

# OSC 52 clipboard support. This is the clipboard path used by Windows
# Terminal/WSL2 and is also a safe fallback for other capable terminals.
set -g set-clipboard on
set -as terminal-features ',xterm*:clipboard'
set -as terminal-features ',screen*:clipboard'
set -as terminal-features ',tmux*:clipboard'

# Keyboard copy bindings. With OSC 52 enabled, tmux sends copied text to
# the host terminal clipboard when no platform-specific command overrides it.
bind-key -T copy-mode Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Prefix+p always pastes tmux's latest buffer. Platform-specific sections
# below replace this with the current system clipboard where supported.
bind-key p paste-buffer

# Windows Terminal / WSL2
if-shell 'grep -qi microsoft /proc/sys/kernel/osrelease 2>/dev/null && command -v powershell.exe >/dev/null 2>&1' {
  # OSC 52 above handles copies to the Windows clipboard. PowerShell is
  # used only to read the Windows clipboard for tmux-driven paste actions.
  bind-key p run-shell \
    "powershell.exe -NoProfile -NonInteractive -Command '[Console]::Out.Write((Get-Clipboard -Raw))' | tmux load-buffer -" \; \
    paste-buffer

  bind-key -n MouseDown2Pane run-shell \
    "powershell.exe -NoProfile -NonInteractive -Command '[Console]::Out.Write((Get-Clipboard -Raw))' | tmux load-buffer -" \; \
    paste-buffer
}

# macOS
if-shell 'command -v pbcopy >/dev/null 2>&1' {
  # Mouse selection -> macOS clipboard
  bind-key -T copy-mode MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel 'pbcopy'

  bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel 'pbcopy'

  # Keyboard selection -> macOS clipboard
  bind-key -T copy-mode Enter \
    send-keys -X copy-pipe-and-cancel 'pbcopy'

  bind-key -T copy-mode-vi Enter \
    send-keys -X copy-pipe-and-cancel 'pbcopy'

  bind-key -T copy-mode-vi y \
    send-keys -X copy-pipe-and-cancel 'pbcopy'

  # Prefix+p / middle-click -> macOS clipboard
  bind-key p run-shell 'pbpaste | tmux load-buffer -' \; paste-buffer
  bind-key -n MouseDown2Pane \
    run-shell 'pbpaste | tmux load-buffer -' \; paste-buffer
}

# Termux/XFCE X11
if-shell 'command -v xclip >/dev/null 2>&1 && [ -n "$DISPLAY" ]' {
  # Mouse selection -> X11 clipboard
  bind-key -T copy-mode MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

  bind-key -T copy-mode-vi MouseDragEnd1Pane \
    send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

  # Keyboard selection -> X11 clipboard
  bind-key -T copy-mode Enter \
    send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

  bind-key -T copy-mode-vi Enter \
    send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

  bind-key -T copy-mode-vi y \
    send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'

  # Prefix+p / middle-click -> X11 clipboard
  bind-key p run-shell \
    'xclip -selection clipboard -out | tmux load-buffer -' \; \
    paste-buffer

  bind-key -n MouseDown2Pane run-shell \
    'xclip -selection clipboard -out | tmux load-buffer -' \; \
    paste-buffer

  # Preserve the existing right-click clipboard paste behaviour in X11.
  bind-key -n MouseDown3Pane run-shell \
    'xclip -selection clipboard -out | tmux load-buffer -' \; \
    paste-buffer
}
